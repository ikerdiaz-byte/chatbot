<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>El meu Portafolis</title>
</head>
<body>

    <h1>Benvingut al meu Portafolis</h1>
    <p>Aquesta és la meva web connectada a un chatbot de Google Colab.</p>

    <div id="chat-container" style="position: fixed; bottom: 20px; right: 20px; width: 300px; border: 1px solid #ccc; border-radius: 10px; background: white; font-family: Arial, sans-serif; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); z-index: 1000;">
        <div style="background: #007bff; color: white; padding: 10px; border-top-left-radius: 10px; border-top-right-radius: 10px; font-weight: bold;">
            🤖 Assistent Iker
        </div>
        <div id="chat-box" style="height: 250px; overflow-y: auto; padding: 10px; font-size: 14px;">
            <p>Hola! Soc la IA de l'Iker. En què et puc ajudar?</p>
        </div>
        <div style="display: flex; border-top: 1px solid #eee;">
            <input type="text" id="user-input" placeholder="Pregunta alguna cosa..." style="flex: 1; padding: 10px; border: none; outline: none;">
            <button onclick="sendMessage()" style="padding: 10px; background: #007bff; color: white; border: none; cursor: pointer;">Enviar</button>
        </div>
    </div>

    <script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const message = input.value;

        if (!message) return;

        box.innerHTML += `<p><b>Tu:</b> ${message}</p>`;
        input.value = '';

        try {
            // AQUÍ HAS DE POSAR LA URL QUE ET DONA NGROK A COLAB
            const NGROK_URL = "https://stairless-leslee-unfrequently.ngrok-free.dev/ask";

            const response = await fetch(NGROK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            box.innerHTML += `<p style="color: blue;"><b>IA:</b> ${data.reply}</p>`;
            box.scrollTop = box.scrollHeight;
        } catch (error) {
            box.innerHTML += `<p style="color: red;">⚠️ Error: Connectant amb Colab...</p>`;
        }
    }
    </script>

</body>
</html>
